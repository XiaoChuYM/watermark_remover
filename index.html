<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google tag (gtag.js) -->

<script>

  gtag('config', 'G-S448BCVSWJ');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水印消消乐</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <h1>水印消消乐</h1>
        <p class="hero-copy">上传图片，涂抹需要去除的区域，即可生成修复结果。</p>
      </div>
      <div class="status-card">
        <span id="opencv-status" class="status-pill ready">已就绪</span>
        <p id="hint-text">建议先用小面积文字或角落 logo 水印测试。</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel controls">
        <label class="upload-card" for="image-input">
          <input id="image-input" type="file" accept="image/*">
          <span class="upload-title">上传图片</span>
          <span class="upload-subtitle">支持点击选择或拖拽到左右画布区域</span>
        </label>

        <div class="control-group">
          <label for="brush-size">画笔大小 <span id="brush-size-value">24 px</span></label>
          <input id="brush-size" type="range" min="4" max="80" value="24">
        </div>

        <div class="control-group">
          <label for="radius">修复半径 <span id="radius-value">5</span></label>
          <input id="radius" type="range" min="1" max="15" value="5">
        </div>

        <label class="debug-toggle">
          <input id="debug-toggle" type="checkbox">
          <span>显示调试信息</span>
        </label>

        <div class="actions">
          <button id="clear-mask" type="button" class="button secondary">清空涂抹</button>
          <button id="run-inpaint" type="button" class="button primary" disabled>开始去水印</button>
          <button id="download-result" type="button" class="button ghost" disabled>下载结果</button>
        </div>

        <div class="notes">
          <p>使用方法：</p>
          <p>1. 上传图片</p>
          <p>2. 在左侧原图上涂抹水印区域</p>
          <p>3. 点击“开始去水印”查看处理效果</p>
          <div id="debug-panel" class="debug-panel hidden">
            <p class="debug-title">调试信息</p>
            <pre id="debug-text">等待处理</pre>
          </div>
        </div>
      </section>

      <section class="panel workspace">
        <div class="canvas-card canvas-card-single">
          <div class="canvas-header">
            <h2 id="viewer-title">原图与遮罩</h2>
            <span id="image-meta">未加载图片</span>
          </div>
          <div id="editor-shell" class="canvas-shell canvas-shell-uploadable">
            <div id="editor-empty-state" class="empty-state">
              <strong>点击或拖入图片</strong>
              <span>上传后可直接在图上涂抹水印区域</span>
            </div>
            <div id="brush-indicator" class="brush-indicator" aria-hidden="true"></div>
            <canvas id="editor-canvas"></canvas>
            <canvas id="result-canvas" class="result-overlay"></canvas>
            <div id="wipe-highlight" class="wipe-highlight" aria-hidden="true"></div>
          </div>
          <div class="viewer-footer">
            <span id="result-meta">等待处理</span>
            <button id="toggle-preview" type="button" class="button ghost" disabled>查看处理后</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
